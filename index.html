<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vasavi Automation Systems | Enterprise IoT</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root { 
        --primary: #4361ee; --bg: #f8f9fc; --card-bg: #ffffff; 
        --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
        --input-bg: #ffffff; --input-text: #1e293b;
    }
    
    [data-theme="dark"] {
        --bg: #0f172a; --card-bg: #1e293b; 
        --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155;
        --input-bg: #334155; --input-text: #ffffff;
    }

    body { background: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s ease; }

    .navbar-brand-custom { padding: 1.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .brand-name { font-weight: 800; font-size: 1.4rem; color: var(--primary); }

    /* KPI Cards */
    .kpi-card { border: 1px solid var(--border); border-radius: 12px; background: var(--card-bg); padding: 1.25rem; height: 100%; transition: transform 0.2s; }
    .kpi-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
    .kpi-val { font-size: 1.5rem; font-weight: 800; }

    /* Single Line Control Bar */
    .control-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--card-bg);
        padding: 0.75rem 1.25rem;
        border-radius: 12px;
        margin-bottom: 2rem;
        border: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 1rem;
    }

    .sync-info { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; border-right: 1px solid var(--border); padding-right: 1.5rem; }
    .sync-dot { height: 8px; width: 8px; background-color: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981; }

    /* Input/Select Styling for Dark Mode */
    .form-control, .form-select, .btn-outline-primary {
        background-color: var(--input-bg) !important;
        color: var(--input-text) !important;
        border-color: var(--border) !important;
    }
    .btn-check:checked + .btn-outline-primary { background-color: var(--primary) !important; color: #fff !important; }

    /* Chart Stack */
    .chart-stack { display: flex; flex-direction: column; gap: 24px; }
    .chart-box { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border); height: 380px; width: 100%; }
    
    #map { height: 400px; border-radius: 16px; margin: 2rem 0; border: 1px solid var(--border); }
    .hidden { display: none; }
    
    @media (max-width: 768px) {
        .control-toolbar { flex-direction: column; align-items: flex-start; }
        .sync-info { border-right: none; padding-bottom: 10px; border-bottom: 1px solid var(--border); width: 100%; }
    }
  </style>
</head>
<body>

<div class="container py-3">
  <header class="navbar-brand-custom">
    <div class="brand-name">VASAVI <span style="opacity: 0.5">Environmental Monitoring (VEM's)</span></div>
    <div class="d-flex gap-2">
        <select id="themeSelect" class="form-select form-select-sm w-auto" onchange="updateTheme(this.value)">
            <option value="light">☀️ Light</option>
            <option value="dark">🌙 Dark</option>
            <option value="system">💻 System</option>
        </select>
        <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="generatePDF()">Export PDF</button>
    </div>
  </header>

  <div class="row g-3 mb-4">
    <div class="col-md-4 col-lg-2"><div class="kpi-card"><div class="kpi-label">Ambient Temperature</div><div class="kpi-val"><span id="v-at">--</span>°C</div></div></div>
    <div class="col-md-4 col-lg-2"><div class="kpi-card"><div class="kpi-label">Ambient Humidity</div><div class="kpi-val"><span id="v-ah">--</span>%</div></div></div>
    <div class="col-md-4 col-lg-2"><div class="kpi-card"><div class="kpi-label">Soil Temperature</div><div class="kpi-val"><span id="v-st">--</span>°C</div></div></div>
    <div class="col-md-4 col-lg-2"><div class="kpi-card"><div class="kpi-label">Soil Humidity</div><div class="kpi-val"><span id="v-sh">--</span>%</div></div></div>
    <div class="col-md-8 col-lg-4"><div class="kpi-card" style="background:var(--primary); color:white; border:none;"><div class="kpi-label" style="color:rgba(255,255,255,0.7)">Solar Intensity</div><div class="kpi-val"><span id="v-lx">--</span> lx</div></div></div>
  </div>

  <div class="control-toolbar">
    <div class="sync-info">
        <span class="sync-dot"></span>
        <span>Live Sync: <span id="last-update" class="fw-bold">--:--:--</span></span>
    </div>
    
    <div class="d-flex flex-grow-1 justify-content-between align-items-center gap-3">
        <div class="btn-group btn-group-sm">
            <input type="radio" class="btn-check" name="range" id="r24" value="24" checked onclick="handleRangeChange(this.value)">
            <label class="btn btn-outline-primary" for="r24">24h</label>
            <input type="radio" class="btn-check" name="range" id="r7" value="168" onclick="handleRangeChange(this.value)">
            <label class="btn btn-outline-primary" for="r7">7d</label>
            <input type="radio" class="btn-check" name="range" id="r30" value="720" onclick="handleRangeChange(this.value)">
            <label class="btn btn-outline-primary" for="r30">30d</label>
            <input type="radio" class="btn-check" name="range" id="rcust" value="custom" onclick="handleRangeChange(this.value)">
            <label class="btn btn-outline-primary" for="rcust">Custom</label>
        </div>

        <div id="custom-inputs" class="hidden">
            <div class="d-flex gap-2">
                <input type="date" id="startDate" class="form-control form-control-sm">
                <input type="date" id="endDate" class="form-control form-control-sm">
                <button class="btn btn-primary btn-sm" onclick="fetchHistory('custom')">Apply</button>
            </div>
        </div>
    </div>
  </div>

  <div id="pdf-area" class="chart-stack">
      <div class="chart-box"><canvas id="atmoChart"></canvas></div>
      <div class="chart-box"><canvas id="soilChart"></canvas></div>
      <div class="chart-box"><canvas id="luxChart"></canvas></div>
  </div>

  <h6 class="mt-5 mb-3 fw-bold text-muted text-uppercase small">Project Deployment Location</h6>
  <div id="map"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
  // Firebase Configuration
  const firebaseConfig = {         apiKey: "AIzaSyBDxPO2M4qLzJ0CPHymC6rMu4BqdZVxcYE",
        authDomain: "smart-farm-58d2e.firebaseapp.com",
        databaseURL: "https://smart-farm-58d2e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-farm-58d2e",
        storageBucket: "smart-farm-58d2e.firebasestorage.app",
        messagingSenderId: "607346437155",
        appId: "1:607346437155:web:2fddabc712330bdf8fd596" };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  let charts = {}, map;

  function updateTheme(mode) {
    const root = document.documentElement;
    if (mode === 'system') {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
    } else { root.setAttribute('data-theme', mode); }
    Object.values(charts).forEach(c => c.update());
  }

  function renderDualChart(id, title, labels, ds1, ds2 = null) {
    if(charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
      type: 'line',
      data: { labels, datasets: [
          { label: ds1.label, data: ds1.data, borderColor: ds1.color, yAxisID: 'y', tension: 0.4, fill: true, backgroundColor: ds1.color + '10', pointRadius: 0, spanGaps: true },
          // Removed borderDash to ensure continuous solid line for second axis
          ...(ds2 ? [{ label: ds2.label, data: ds2.data, borderColor: ds2.color, yAxisID: 'y1', tension: 0.4, pointRadius: 0, spanGaps: true }] : [])
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { 
            title: { display: true, text: title, align: 'start', font: { weight: 'bold', size: 14 } },
            tooltip: { enabled: true } 
        },
        scales: { 
            y: { type: 'linear', position: 'left', grid: { color: 'rgba(0,0,0,0.05)' } }, 
            y1: { type: 'linear', position: 'right', display: !!ds2, grid: { drawOnChartArea: false } }
        }
      }
    });
  }

  db.ref('locations/location-1/latest').on('value', (snap) => {
    const d = snap.val();
    if (d) {
        document.getElementById('v-at').innerText = d.ambient_temp || "0";
        document.getElementById('v-ah').innerText = d.ambient_hum || "0";
        document.getElementById('v-st').innerText = d.soil_temp || "0";
        document.getElementById('v-sh').innerText = d.soil_hum || "0";
        document.getElementById('v-lx').innerText = d.lux || "0";
        document.getElementById('last-update').innerText = new Date(d.ts).toLocaleTimeString();
    }
  });

  function fetchHistory(hrs) {
    const cutoff = (hrs === 'custom') ? new Date(document.getElementById('startDate').value).getTime() : Date.now() - (hrs * 3600000);
    db.ref('locations/location-1/logs').orderByChild('ts').startAt(cutoff).once('value', (snap) => {
        const labs = [], at = [], ah = [], st = [], sh = [], lx = [];
        snap.forEach(c => {
            const v = c.val();
            labs.push(new Date(v.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
            at.push(v.ambient_temp); ah.push(v.ambient_hum);
            st.push(v.soil_temp); sh.push(v.soil_hum); lx.push(v.lux);
        });
        renderDualChart('atmoChart', 'Atmospheric Trends', labs, {label:'Temp (°C)', color:'#ef4444', data:at}, {label:'Hum (%)', color:'#3b82f6', data:ah});
        renderDualChart('soilChart', 'Soil Environment', labs, {label:'Soil Temp (°C)', color:'#f59e0b', data:st}, {label:'Soil Moist (%)', color:'#10b981', data:sh});
        renderDualChart('luxChart', 'Light Intensity History', labs, {label:'Lux (lx)', color:'#6366f1', data:lx});
    });
  }

  function handleRangeChange(val) {
    document.getElementById('custom-inputs').classList.toggle('hidden', val !== 'custom');
    if(val !== 'custom') fetchHistory(val);
  }

  window.onload = () => {
    map = L.map('map').setView([13.70582215029928, 100.81257863518886], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([13.70582215029928, 100.81257863518886]).addTo(map);
    fetchHistory(24);
  };

  function generatePDF() { html2pdf().from(document.getElementById('pdf-area')).save('Nebulux_Report.pdf'); }
</script>
</body>
</html>
